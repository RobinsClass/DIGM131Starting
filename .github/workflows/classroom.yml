name: Autograding Tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  autograde:
    name: Run Assignment Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Detect and run assignment tests
        run: python .github/scripts/run_tests.py
